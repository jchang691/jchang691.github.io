<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #2e2e40;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 24px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.05em;
    }

    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 200px;
      height: 160px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 600;
      transition: border-color 0.2s, transform 0.2s;
    }

    a.card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    a.card .icon {
      font-size: 2.4rem;
    }
  </style>
</head>
<body>
  <h1>Workout Tools</h1>
  <div class="cards">
    <a class="card" href="./cards">
      <span class="icon">&#127137;</span>
      <span>Card Deck</span>
    </a>
    <a class="card" href="./tabata">
      <span class="icon">&#9201;</span>
      <span>Tabata Timer</span>
    </a>
  </div>
</body>
</html>
